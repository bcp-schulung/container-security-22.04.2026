server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 8443 ssl http2 default_server;
    listen [::]:8443 ssl http2 default_server;
    server_name _;

    # Mount these as secrets in production
    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # CSP must match your app. This one is safe for simple static sites.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; upgrade-insecure-requests" always;

    # Request abuse protection
    limit_req zone=req_per_ip burst=20 nodelay;
    limit_conn conn_per_ip 20;

    # Only serve expected methods
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 405;
    }

    # Static site option
    root /srv/www;
    index index.html;
    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy option
    # Uncomment this block and remove the static block above if proxying an app
    #
    # location / {
    #     proxy_pass https://backend.example.internal:9443;
    #     proxy_read_timeout 30s;
    #     proxy_connect_timeout 5s;
    #     proxy_send_timeout 30s;
    # }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}